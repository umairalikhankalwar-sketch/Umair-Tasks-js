<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<script>

    let marks = Number(prompt("Enter your marks🔢🔢🤔💭:"));
if (marks >= 80) {
    alert("Grade: A");
}
else if (marks >= 60) {
    alert("Grade: B");
}
else if (marks >= 40) {
    alert("Grade: C");
}
else {
    alert("Fail");
}
</script>

</body>
</html>
