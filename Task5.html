<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <script>

let number = Number(prompt("Enter a number:"));

if (number > 0) {
    alert("Positive Number");
}
else if (number < 0) {
    alert("Negative Number");
}
else {
    alert("Zero");
}

    </script>

</body>
</html>
