<script>
let ch = prompt("Enter a single alphabet:").toLowerCase();
if (ch === "a" || ch === "e" || ch === "i" || ch === "o" || ch === "u") {
    alert("Vowel");
}
else {
    alert("Consonant");
}

</script>
