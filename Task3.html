<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    
<script>

    let num1 = Number(prompt("Enter first numberрЯФҐрЯФҐрЯ§ФрЯТ≠:"));
let operator = prompt("Enter operator (+, -, *, /)рЯФҐрЯФҐрЯ§ФрЯТ≠:");
let num2 = Number(prompt("Enter second numberрЯФҐрЯФҐрЯ§ФрЯТ≠:"));
switch (operator) {
    case "+":
        alert(num1 + num2);
        break;
    case "-":
        alert(num1 - num2);
        break;
    case "*":
        alert(num1 * num2);
        break;
    case "/":
        if (num2 !== 0) {
            alert(num1 / num2);
        } else {
            alert("Cannot divide by zero.");
        }
        break;
    default:
        alert("Invalid OperatorрЯ§¶вАНвЩАпЄПрЯ§¶вАНвЩАпЄПрЯ§¶вАНвЩАпЄП");
}
</script>

</body>
</html>
